<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="robots" content="index, follow">
    <meta name="author" content="alycol">
    <meta name="language" content="zh-Hant">
    <meta name="revisit-after" content="1 days">
    <title>六合彩 AI 真實命中率統計 | 單式・複式・膽拖命中率分析</title>
    <meta name="description" content="查看六合彩 AI 預測系統的真實命中率數據，包括單式注數命中分佈、複式推薦號碼命中率、膽拖組合表現。基於實際開獎結果統計。">
    <meta name="keywords" content="六合彩命中率,AI預測準確度,六合彩統計,複式命中,膽拖命中">
    <link rel="canonical" href="https://hk6.netlify.app/stats_real_accuracy">
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans TC', sans-serif; }
        body { background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%); margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; background: rgba(255,255,255,0.1); backdrop-filter: blur(2px); border-radius: 2rem; padding: 1.5rem; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.4); }
        .stats-grid { display: flex; flex-direction: column; gap: 1.5rem; }
        .stat-card { background: white; border-radius: 1.5rem; padding: 1.5rem; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .card-header { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; margin-bottom: 1rem; border-left: 4px solid #f97316; padding-left: 1rem; }
        .card-header h3 { margin: 0; font-size: 1.4rem; color: #0f172a; }
        .badge { background: #f97316; color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 40px; }
        .stats-summary { background: #f8fafc; border-radius: 1rem; padding: 0.8rem 1rem; margin-bottom: 1.5rem; display: flex; flex-wrap: wrap; gap: 1rem; align-items: baseline; border: 1px solid #e2e8f0; }
        .stats-summary p { margin: 0; font-size: 0.95rem; color: #334155; }
        .stats-summary strong { color: #0f172a; }
        .metric { font-size: 1.3rem; font-weight: bold; color: #f97316; margin: 0 0.2rem; }
        .stat-table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.9rem; }
        .stat-table th, .stat-table td { padding: 10px 6px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .stat-table th { background-color: #f1f5f9; font-weight: 600; color: #1e293b; }
        .stat-table td { color: #334155; }
        .chart-container { margin-top: 1rem; padding-top: 0.5rem; border-top: 1px solid #e2e8f0; }
        canvas { max-height: 200px; width: 100%; }
        .info-note { font-size: 0.75rem; color: #475569; margin-top: 1rem; text-align: center; background: #f1f5f9; padding: 0.5rem; border-radius: 0.75rem; }
        .footer-links { text-align: center; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.2); }
        .footer-links a { color: #f97316; text-decoration: none; margin: 0 12px; font-size: 0.9rem; }
        .footer-links a:hover { text-decoration: underline; }
        .loading, .error-box { text-align: center; padding: 2rem; background: white; border-radius: 1.5rem; margin: 1rem 0; }
        .error-box { background: #fee2e2; color: #dc2626; }
        h1 { margin: 0 0 0.25rem 0; font-size: 1.8rem; color: #0f172a; display: flex; align-items: center; gap: 8px; background: white; border-radius: 1.5rem; padding: 1rem 1.5rem; margin-bottom: 1.5rem; }
        .sub { color: #475569; font-size: 0.85rem; border-left: 3px solid #f97316; padding-left: 0.75rem; margin: 0 0 1rem 0; background: white; border-radius: 1rem; padding: 0.8rem 1rem; }
        .trend-card { background: white; border-radius: 1.5rem; padding: 1.5rem; margin-top: 1.5rem; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .version-note { font-size: 0.8rem; text-align: center; margin-top: 10px; color: #f97316; }
        @media (max-width: 640px) {
            .container { padding: 1rem; }
            .stat-card { padding: 1rem; }
            .stat-table th, .stat-table td { padding: 6px 2px; font-size: 0.75rem; }
            .metric { font-size: 1.1rem; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="container">
    <h1>📊 真實用戶命中率分析 <span class="badge" style="background:#10b981;"></span></h1>
    <div class="sub">基於 Google Forms 收集的用戶預測數據｜匹配真實開獎結果｜<span id="updateTime"></span></div>
    <div id="accuracyContent"><div class="loading">⏳ 載入數據並進行命中率比對中...</div></div>
    <div class="footer-links"><a href="/">← 返回預測系統</a> | <a href="/stats">📊 數據統計</a> | <a href="/stats_accuracy.html">📈 回測命中率</a></div>
</div>

<script>
    const API_KEY = 'AIzaSyCmpR7qGwgfE3y7XIS-O1_cny_iBsDa7No';
    const RESULT_SHEET_ID = '1N0DoSvoTjfQ_aFWkG3pOn_28MaquDSwnfiyTJqVA2Fw';
    const RESULT_RANGE = 'sheet1!A:H';
    const PREDICT_SHEET_ID = '1ddt9iUMO4FYqJI5_mnoSU5LmgcFW8XKeI043UPY-iKk';
    const PREDICT_RANGE = 'Form Responses 1!A:F';

    let resultMap = new Map();
    let predictions = [];

    function parseRecommendations(recStr, mode) {
        try {
            if (mode === 'single') return JSON.parse(recStr);
            if (mode === 'replica') return JSON.parse(recStr);
            if (mode === 'dantuo') return JSON.parse(recStr);
        } catch(e) { return null; }
        return null;
    }

    async function loadResults() {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${RESULT_SHEET_ID}/values/${RESULT_RANGE}?key=${API_KEY}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`開獎表讀取失敗: ${resp.status}`);
        const data = await resp.json();
        if (!data.values || data.values.length < 2) throw new Error("開獎表無數據");
        for (let i = 1; i < data.values.length; i++) {
            const row = data.values[i];
            if (row.length < 8) continue;
            const issue = row[0].trim();
            const n1 = parseInt(row[1]), n2 = parseInt(row[2]), n3 = parseInt(row[3]);
            const n4 = parseInt(row[4]), n5 = parseInt(row[5]), n6 = parseInt(row[6]);
            const special = parseInt(row[7]);
            if (isNaN(n1+n2+n3+n4+n5+n6+special)) continue;
            const numbers = [n1,n2,n3,n4,n5,n6];
            const issueKey = `${numbers.join(',')}|${special}`;
            resultMap.set(issueKey, { issue, numbers, special });
        }
        console.log(`開獎結果載入完成，共 ${resultMap.size} 期`);
    }

    async function loadPredictions() {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${PREDICT_SHEET_ID}/values/${PREDICT_RANGE}?key=${API_KEY}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`預測表讀取失敗: ${resp.status}`);
        const data = await resp.json();
        if (!data.values || data.values.length < 2) throw new Error("預測表無數據");
        for (let i = 1; i < data.values.length; i++) {
            const row = data.values[i];
            if (row.length < 6) continue;
            const mode = row[2];
            const recStr = row[4];
            const issueKey = row[5];
            if (!issueKey) continue;
            const result = resultMap.get(issueKey);
            if (!result) continue;
            const rec = parseRecommendations(recStr, mode);
            if (!rec) continue;
            predictions.push({
                mode, rec, resultNumbers: result.numbers,
                issue: result.issue
            });
        }
        console.log(`用戶預測載入完成，共 ${predictions.length} 筆有效匹配`);
    }

    function computeStats() {
        let singleHitDist = [0,0,0,0,0,0,0];
        let singleTotal = 0;
        let replicaHitDist = [0,0,0,0,0,0,0];
        let replicaTotal = 0;
        let danHitDist = [0,0,0];
        let tuoHitDist = [0,0,0,0,0,0,0];
        let dantuoTotal = 0;

        for (let p of predictions) {
            const mode = p.mode;
            const resultNums = p.resultNumbers;
            if (mode === 'single') {
                for (let ticket of p.rec) {
                    const hit = ticket.filter(n => resultNums.includes(n)).length;
                    if (hit >=0 && hit<=6) singleHitDist[hit]++;
                    singleTotal++;
                }
            } else if (mode === 'replica') {
                const hit = p.rec.filter(n => resultNums.includes(n)).length;
                if (hit>=0 && hit<=6) replicaHitDist[hit]++;
                replicaTotal++;
            } else if (mode === 'dantuo') {
                const { dan, tuo } = p.rec;
                const danHit = dan.filter(n => resultNums.includes(n)).length;
                const tuoHit = tuo.filter(n => resultNums.includes(n)).length;
                if (danHit>=0 && danHit<=2) danHitDist[danHit]++;
                if (tuoHit>=0 && tuoHit<=6) tuoHitDist[tuoHit]++;
                dantuoTotal++;
            }
        }
        return { single: { dist: singleHitDist, total: singleTotal }, replica: { dist: replicaHitDist, total: replicaTotal }, dantuo: { danDist: danHitDist, tuoDist: tuoHitDist, total: dantuoTotal } };
    }

    // 按期號聚合命中率
    function computeHitRateByIssue() {
        const issueMap = new Map();
        for (let p of predictions) {
            if (p.mode !== 'single') continue;
            if (!p.issue) continue;
            if (!issueMap.has(p.issue)) issueMap.set(p.issue, { totalTickets: 0, hitTickets: 0 });
            const day = issueMap.get(p.issue);
            for (let ticket of p.rec) {
                const hitCount = ticket.filter(n => p.resultNumbers.includes(n)).length;
                day.totalTickets++;
                if (hitCount >= 3) day.hitTickets++;
            }
        }
        const sorted = Array.from(issueMap.entries()).sort((a,b) => {
            const numA = parseInt(a[0].split('/')[1]);
            const numB = parseInt(b[0].split('/')[1]);
            return numA - numB;
        });
        const labels = sorted.map(d => d[0]);
        const rates = sorted.map(d => (d[1].hitTickets / d[1].totalTickets * 100).toFixed(2));
        return { labels, rates: rates.map(r => parseFloat(r)) };
    }

    function renderTrendChart(labels, rates) {
        const ctx = document.getElementById('dailyTrendChart').getContext('2d');
        if (window.trendChart) window.trendChart.destroy();
        
        window.trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '至少中3碼比例 (%)',
                    data: rates,
                    borderColor: '#f97316',
                    backgroundColor: 'rgba(249,115,22,0.1)',
                    tension: 0.1,
                    fill: true,
                    pointRadius: 4,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    tooltip: { callbacks: { label: (ctx) => `${ctx.raw}%` } },
                    legend: { position: 'top' }
                },
                scales: {
                    y: { title: { display: true, text: '命中率 (%)', color: '#475569' }, min: 0, max: 100, ticks: { callback: (val) => `${val}%` } },
                    x: { title: { display: true, text: '開獎期號', color: '#475569' } }
                }
            }
        });
    }

    function renderStats(stats) {
        const single = stats.single;
        const replica = stats.replica;
        const dantuo = stats.dantuo;

        function ensure7(arr) { let a = [...arr]; while(a.length<7) a.push(0); return a.slice(0,7); }
        function ensure3(arr) { let a = [...arr]; while(a.length<3) a.push(0); return a.slice(0,3); }
        const replicaDist = ensure7(replica.dist);
        const tuoDist = ensure7(dantuo.tuoDist);
        const danDist = ensure3(dantuo.danDist);

        const singleRate3Plus = single.total ? (single.dist.slice(3).reduce((a,b)=>a+b,0) / single.total * 100).toFixed(2) : '0';
        const singlePercent = single.dist.map(c => single.total ? (c / single.total * 100).toFixed(1) : '0');
        const replicaAvgHit = replica.total ? (replicaDist.reduce((s,c,i)=>s+c*i,0) / replica.total).toFixed(2) : '0';
        const replicaAtLeast3 = replicaDist.slice(3).reduce((a,b)=>a+b,0);
        const replicaRate3Plus = replica.total ? (replicaAtLeast3 / replica.total * 100).toFixed(2) : '0';
        const danAvgHit = dantuo.total ? (danDist.reduce((s,c,i)=>s+c*i,0) / dantuo.total).toFixed(2) : '0';
        const tuoAvgHit = dantuo.total ? (tuoDist.reduce((s,c,i)=>s+c*i,0) / dantuo.total).toFixed(2) : '0';
        const danAtLeast1 = danDist.slice(1).reduce((a,b)=>a+b,0);
        const danRate1Plus = dantuo.total ? (danAtLeast1 / dantuo.total * 100).toFixed(2) : '0';

        const replicaRow = `<tr><td><strong>次數</strong></td>${replicaDist.map(c => `<td>${c}</td>`).join('')}</tr>`;
        const tuoRow = `<tr><td><strong>次數</strong></td>${tuoDist.map(c => `<td>${c}</td>`).join('')}</tr>`;
        const danRow = `<tr><td><strong>次數</strong></td>${danDist.map(c => `<td>${c}</td>`).join('')}</tr>`;

        let mainHtml = `
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="card-header"><h3>📌 單式</h3><span class="badge">每注獨立統計</span></div>
                    <div class="stats-summary"><p>總注數：<strong>${single.total}</strong></p><p>🎯 至少中3個號碼的比例：<span class="metric">${singleRate3Plus}%</span> (七獎$40)</p></div>
                    <table class="stat-table"><thead><tr><th>命中數目</th><th>0</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th></tr></thead>
                    <tbody><tr><td><strong>注數</strong></td>${single.dist.map(c => `<td>${c}</td>`).join('')}</tr>
                    <tr><td><strong>百分比</strong></td>${singlePercent.map(p => `<td>${p}%</td>`).join('')}</tr></tbody></table>
                    <div class="info-note">註：每注命中3個以上即為有獎（七獎$40）</div>
                </div>
                <div class="stat-card">
                    <div class="card-header"><h3>🔢 複式</h3><span class="badge">每組預測N個號碼</span></div>
                    <div class="stats-summary"><p>總生成次數：<strong>${replica.total}</strong></p><p>📊 平均包含中獎號碼數：<span class="metric">${replicaAvgHit}</span> / 6</p><p>🎯 包含至少3個中獎號碼的比例：<span class="metric">${replicaRate3Plus}%</span></p></div>
                    <table class="stat-table"><thead><tr><th>命中數目</th><th>0</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th></tr></thead><tbody>${replicaRow}</tbody></table>
                    <div class="chart-container"><canvas id="replicaChart"></canvas></div>
                </div>
                <div class="stat-card">
                    <div class="card-header"><h3>🎯 膽拖</h3><span class="badge">膽+配腳組合</span></div>
                    <div class="stats-summary"><p>總生成次數：<strong>${dantuo.total}</strong></p><p>🎯 膽平均命中數：<span class="metric">${danAvgHit}</span> / 2 &nbsp;|&nbsp; 膽命中≥1的比例：${danRate1Plus}%</p><p>🎲 配腳平均命中數：<span class="metric">${tuoAvgHit}</span> / 6</p></div>
                    <table class="stat-table"><thead><tr><th>膽命中</th><th>0</th><th>1</th><th>2</th></tr></thead><tbody>${danRow}</tbody></td>
                    <table class="stat-table"><thead><tr><th>配腳命中</th><th>0</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th></tr></thead><tbody>${tuoRow}</tbody></table>
                    <div class="chart-container"><canvas id="dantuoChart"></canvas></div>
                </div>
            </div>
        `;
        
        const trendHtml = `
            <div class="trend-card">
                <h3 style="margin:0 0 0.5rem 0;">📈 單式每期命中率趨勢（至少中3碼）</h3>
                <div style="margin-top: 1rem;">
                    <canvas id="dailyTrendChart" width="800" height="400" style="max-height: 300px; width: 100%;"></canvas>
                </div>
                <div class="version-note">※ 模型修正參考：統一評分模型於 26/052 期上線</div>
                <div class="info-note">每點對應各期所有單式預測注數的命中率。</div>
            </div>
        `;
        
        document.getElementById('accuracyContent').innerHTML = mainHtml + trendHtml;
        document.getElementById('updateTime').innerText = `最後更新：${new Date().toLocaleString()}`;

        if (replica.total) {
            new Chart(document.getElementById('replicaChart'), {
                type: 'bar',
                data: { labels: ['0','1','2','3','4','5','6'], datasets: [{ label: '命中次數分佈', data: replicaDist, backgroundColor: '#f97316', borderRadius: 6 }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top' }, tooltip: { callbacks: { label: (ctx) => `${ctx.raw} 次` } } } }
            });
        }
        if (dantuo.total) {
            new Chart(document.getElementById('dantuoChart'), {
                type: 'bar',
                data: { labels: ['配腳 0','1','2','3','4','5','6'], datasets: [{ label: '配腳命中分佈', data: tuoDist, backgroundColor: '#3b82f6', borderRadius: 6 }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top' }, tooltip: { callbacks: { label: (ctx) => `${ctx.raw} 次` } } } }
            });
        }
    }

    async function init() {
        try {
            await loadResults();
            await loadPredictions();
            const stats = computeStats();
            renderStats(stats);
            const { labels, rates } = computeHitRateByIssue();
            if (labels.length > 0) renderTrendChart(labels, rates);
            else console.warn("無足夠數據繪製趨勢圖");
        } catch (err) {
            console.error(err);
            document.getElementById('accuracyContent').innerHTML = `<div class="error-box">❌ 載入失敗：${err.message}</div>`;
        }
    }
    init();
</script>
</body>
</html>
