<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六合彩 AI - 真實命中率分析 | 趨勢圖與模型修正標記</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans TC', sans-serif; }
        body { background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%); margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; background: rgba(255,255,255,0.1); backdrop-filter: blur(2px); border-radius: 2rem; padding: 1.5rem; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.4); }
        .card { background: white; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h1, h2 { margin: 0 0 0.5rem 0; color: #0f172a; }
        .sub { color: #475569; border-left: 3px solid #f97316; padding-left: 0.75rem; margin-bottom: 1rem; }
        .stats-summary { background: #f8fafc; border-radius: 1rem; padding: 1rem; margin-bottom: 1rem; }
        .stat-table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        .stat-table th, .stat-table td { padding: 8px 4px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .chart-container { margin: 1.5rem 0; min-height: 400px; position: relative; }
        .footer-links { text-align: center; margin-top: 1.5rem; }
        .footer-links a { color: #f97316; text-decoration: none; margin: 0 12px; }
        .loading { text-align: center; padding: 2rem; }
        .error-box { background: #fee2e2; border-radius: 1rem; padding: 1rem; text-align: center; color: #dc2626; }
        .version-legend { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 15px; justify-content: center; }
        .version-marker { display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; }
        .version-marker .line-dash { width: 30px; height: 2px; background: repeating-linear-gradient(90deg, #f97316, #f97316 5px, transparent 5px, transparent 10px); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="container">
    <h1>📊 真實命中率分析 (含模型修正標記)</h1>
    <div class="sub">基於用戶預測與真實開獎比對｜<span id="updateTime"></span></div>

    <div id="statsContent" class="card loading">⏳ 載入數據中...</div>

    <div class="card">
        <h2>📈 每日「至少中3碼」比例趨勢</h2>
        <div class="chart-container">
            <canvas id="trendChart" width="800" height="400"></canvas>
        </div>
        <div class="version-legend" id="legendContainer"></div>
        <div class="info-text" style="font-size:0.8rem; color:#475569; text-align:center; margin-top:10px;">
            垂直虛線代表模型修正日期（可於程式碼中調整）。每點代表該日所有單式注數的中獎率（命中≥3個號碼）。
        </div>
    </div>

    <div class="footer-links">
        <a href="/">← 返回預測系統</a> | <a href="/stats.html">📊 數據統計</a> | <a href="/devlog.html">📝 開發日誌</a>
    </div>
</div>

<script>
    // ==================== 配置：模型修正時間點 (YYYY-MM-DD 及說明) ====================
    const VERSION_MARKERS = [
        { date: "2026-05-17", label: "統一評分模型上線" },
        // 可繼續增加，例如 { date: "2026-05-24", label: "調整冷熱權重" }
    ];

    // ==================== 數據讀取與圖表繪製邏輯 ====================
    const API_KEY = 'AIzaSyCmpR7qGwgfE3y7XIS-O1_cny_iBsDa7No';
    const RESULT_SHEET_ID = '1N0DoSvoTjfQ_aFWkG3pOn_28MaquDSwnfiyTJqVA2Fw';
    const RESULT_RANGE = 'sheet1!A:H';
    const PREDICT_SHEET_ID = '1ddt9iUMO4FYqJI5_mnoSU5LmgcFW8XKeI043UPY-iKk';
    const PREDICT_RANGE = 'Form Responses 1!A:F';

    let resultMap = new Map();
    let predictions = [];   // 儲存有效的預測記錄

    async function loadResults() {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${RESULT_SHEET_ID}/values/${RESULT_RANGE}?key=${API_KEY}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`開獎表讀取失敗: ${resp.status}`);
        const data = await resp.json();
        if (!data.values || data.values.length < 2) throw new Error("開獎表無數據");
        for (let i = 1; i < data.values.length; i++) {
            const row = data.values[i];
            if (row.length < 8) continue;
            const issue = row[0].trim();
            const n1 = parseInt(row[1]), n2 = parseInt(row[2]), n3 = parseInt(row[3]);
            const n4 = parseInt(row[4]), n5 = parseInt(row[5]), n6 = parseInt(row[6]);
            const special = parseInt(row[7]);
            if (isNaN(n1+n2+n3+n4+n5+n6+special)) continue;
            const numbers = [n1,n2,n3,n4,n5,n6];
            const issueKey = `${numbers.join(',')}|${special}`;
            resultMap.set(issueKey, { issue, numbers, special });
        }
        console.log(`開獎結果載入完成，共 ${resultMap.size} 期`);
    }

    function parseRecommendations(recStr, mode) {
        try {
            if (mode === 'single') return JSON.parse(recStr);
            if (mode === 'replica') return JSON.parse(recStr);
            if (mode === 'dantuo') return JSON.parse(recStr);
        } catch(e) { return null; }
        return null;
    }

    async function loadPredictions() {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${PREDICT_SHEET_ID}/values/${PREDICT_RANGE}?key=${API_KEY}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`預測表讀取失敗: ${resp.status}`);
        const data = await resp.json();
        if (!data.values || data.values.length < 2) throw new Error("預測表無數據");
        for (let i = 1; i < data.values.length; i++) {
            const row = data.values[i];
            if (row.length < 6) continue;
            const timestampStr = row[0];
            if (!timestampStr) continue;
            const ts = new Date(timestampStr);
            if (isNaN(ts.getTime())) continue; // 無效日期跳過
            const mode = row[2];
            const recStr = row[4];
            const issueKey = row[5];
            if (!issueKey) continue;
            const result = resultMap.get(issueKey);
            if (!result) continue;
            const rec = parseRecommendations(recStr, mode);
            if (!rec) continue;
            predictions.push({
                timestamp: ts,
                mode,
                rec,
                resultNumbers: result.numbers,
                resultSpecial: result.special
            });
        }
        console.log(`用戶預測載入完成，共 ${predictions.length} 筆有效匹配`);
    }

    function computeDailyHitRate() {
        const dailyData = new Map(); // key: YYYY-MM-DD, value: { totalTickets, hitTickets }
        for (let p of predictions) {
            if (p.mode !== 'single') continue;
            const dateStr = p.timestamp.toISOString().slice(0,10);
            if (!dailyData.has(dateStr)) dailyData.set(dateStr, { totalTickets: 0, hitTickets: 0 });
            const day = dailyData.get(dateStr);
            for (let ticket of p.rec) {
                const hitCount = ticket.filter(n => p.resultNumbers.includes(n)).length;
                day.totalTickets++;
                if (hitCount >= 3) day.hitTickets++;
            }
        }
        const sorted = Array.from(dailyData.entries()).sort((a,b) => a[0].localeCompare(b[0]));
        const labels = sorted.map(d => d[0]);
        const rates = sorted.map(d => (d[1].hitTickets / d[1].totalTickets * 100).toFixed(2));
        return { labels, rates };
    }

    // 自定義插件：繪製垂直虛線
    const verticalLinePlugin = {
        id: 'verticalLines',
        afterDraw(chart, args, options) {
            const { ctx, chartArea: { top, bottom }, scales } = chart;
            if (!options.markers || options.markers.length === 0) return;
            const xAxis = scales.x;
            options.markers.forEach(marker => {
                const x = xAxis.getPixelForValue(marker.date);
                if (x >= chartArea.left && x <= chartArea.right) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.strokeStyle = marker.color || '#f97316';
                    ctx.setLineDash([6, 6]);
                    ctx.lineWidth = 2;
                    ctx.moveTo(x, top);
                    ctx.lineTo(x, bottom);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.fillStyle = marker.color || '#f97316';
                    ctx.font = '12px system-ui';
                    ctx.fillText(marker.label, x + 5, top + 15);
                    ctx.restore();
                }
            });
        }
    };

    async function init() {
        try {
            await loadResults();
            await loadPredictions();
            const { labels, rates } = computeDailyHitRate();
            const rateNumbers = rates.map(r => parseFloat(r));

            // 過濾模型標記，只保留在 labels 中存在的日期
            const markers = [];
            for (let m of VERSION_MARKERS) {
                if (labels.includes(m.date)) {
                    markers.push({ date: m.date, label: m.label, color: '#f97316' });
                } else {
                    console.warn(`標記日期 ${m.date} 不在圖表範圍內，未繪製虛線`);
                }
            }

            const ctx = document.getElementById('trendChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '至少中3碼比例 (%)',
                        data: rateNumbers,
                        borderColor: '#f97316',
                        backgroundColor: 'rgba(249,115,22,0.1)',
                        tension: 0.1,
                        fill: true,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        tooltip: { callbacks: { label: (ctx) => `${ctx.raw}%` } },
                        legend: { position: 'top' },
                        verticalLines: { markers }  // 傳遞 markers 給插件
                    },
                    scales: {
                        y: { title: { display: true, text: '命中率 (%)', color: '#475569' }, min: 0, max: 100, ticks: { callback: (val) => `${val}%` } },
                        x: { title: { display: true, text: '日期', color: '#475569' } }
                    }
                },
                plugins: [verticalLinePlugin]
            });

            // 更新圖例說明
            const legendDiv = document.getElementById('legendContainer');
            if (legendDiv && markers.length) {
                legendDiv.innerHTML = markers.map(m => `<div class="version-marker"><div class="line-dash"></div> <span>${m.label} (${m.date})</span></div>`).join('');
            } else if (legendDiv) {
                legendDiv.innerHTML = '<div class="version-marker">暫無模型修正標記</div>';
            }

            document.getElementById('updateTime').innerText = `最後更新：${new Date().toLocaleString()}`;
            const totalSinglePredictions = predictions.filter(p => p.mode === 'single').length;
            document.getElementById('statsContent').innerHTML = `<div class="stats-summary"><strong>總體命中率統計</strong><br>共分析 ${totalSinglePredictions} 筆預測記錄（單式注數），每日趨勢如上圖。</div>`;
        } catch (err) {
            console.error(err);
            document.getElementById('statsContent').innerHTML = `<div class="error-box">❌ 載入失敗：${err.message}</div>`;
            document.getElementById('updateTime').innerText = `載入失敗：${new Date().toLocaleString()}`;
        }
    }
    init();
</script>
</body>
</html>
