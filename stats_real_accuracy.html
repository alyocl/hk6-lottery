<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>六合彩 AI - 真實命中率分析 (開發者專用)</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans TC', sans-serif; }
        body { background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%); margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; background: rgba(255,255,255,0.1); backdrop-filter: blur(2px); border-radius: 2rem; padding: 1.5rem; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.4); }
        .card { background: white; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        h1 { margin: 0 0 0.25rem 0; font-size: 1.8rem; color: #0f172a; display: flex; align-items: center; gap: 8px; }
        .badge { background: #10b981; color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 40px; }
        .sub { color: #475569; font-size: 0.85rem; border-left: 3px solid #f97316; padding-left: 0.75rem; margin-top: 6px; margin-bottom: 1.5rem; }
        table { width: 100%; border-collapse: collapse; margin: 12px 0; }
        th, td { padding: 8px 6px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f1f5f9; font-weight: 600; }
        .metric { font-size: 1.4rem; font-weight: bold; color: #f97316; }
        .info-note { font-size: 0.75rem; color: #475569; margin-top: 8px; text-align: center; }
        .footer-links { text-align: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #e2e8f0; }
        .footer-links a { color: #f97316; text-decoration: none; margin: 0 12px; font-size: 0.9rem; }
        canvas { max-height: 200px; width: 100%; margin-top: 10px; }
        .loading { text-align: center; padding: 2rem; color: #475569; }
        .error-box { background: #fee2e2; border-radius: 1rem; padding: 1rem; text-align: center; color: #dc2626; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📊 真實用戶命中率分析 <span class="badge">開發者專用</span></h1>
        <div class="sub">基於 Google Forms 收集的用戶預測數據｜匹配真實開獎結果｜<span id="updateTime"></span></div>
    </div>
    <div id="accuracyContent"><div class="card loading">⏳ 載入數據並進行命中率比對中...</div></div>
    <div class="footer-links"><a href="/">← 返回預測系統</a> | <a href="/stats.html">📊 數據統計</a> | <a href="/stats_accuracy.html">📈 回測命中率</a></div>
</div>

<script>
    const API_KEY = 'AIzaSyCmpR7qGwgfE3y7XIS-O1_cny_iBsDa7No';
    const RESULT_SHEET_ID = '1N0DoSvoTjfQ_aFWkG3pOn_28MaquDSwnfiyTJqVA2Fw';
    const RESULT_RANGE = 'sheet1!A:H';
    const PREDICT_SHEET_ID = '1ddt9iUMO4FYqJI5_mnoSU5LmgcFW8XKeI043UPY-iKk';
    const PREDICT_RANGE = 'Form Responses 1!A:F';

    let resultMap = new Map();
    let predictions = [];

    function parseRecommendations(recStr, mode) {
        try {
            if (mode === 'single') return JSON.parse(recStr);
            if (mode === 'replica') return JSON.parse(recStr);
            if (mode === 'dantuo') return JSON.parse(recStr);
        } catch(e) { console.error("解析失敗", recStr, e); return null; }
        return null;
    }

    async function loadResults() {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${RESULT_SHEET_ID}/values/${RESULT_RANGE}?key=${API_KEY}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`開獎表讀取失敗: ${resp.status}`);
        const data = await resp.json();
        if (!data.values || data.values.length < 2) throw new Error("開獎表無數據");
        for (let i = 1; i < data.values.length; i++) {
            const row = data.values[i];
            if (row.length < 8) continue;
            const issue = row[0].trim();
            const n1 = parseInt(row[1]), n2 = parseInt(row[2]), n3 = parseInt(row[3]);
            const n4 = parseInt(row[4]), n5 = parseInt(row[5]), n6 = parseInt(row[6]);
            const special = parseInt(row[7]);
            if (isNaN(n1+n2+n3+n4+n5+n6+special)) continue;
            const numbers = [n1,n2,n3,n4,n5,n6];
            const issueKey = `${numbers.join(',')}|${special}`;
            resultMap.set(issueKey, { issue, numbers, special });
        }
        console.log(`開獎結果載入完成，共 ${resultMap.size} 期`);
    }

    async function loadPredictions() {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${PREDICT_SHEET_ID}/values/${PREDICT_RANGE}?key=${API_KEY}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error(`預測表讀取失敗: ${resp.status}`);
        const data = await resp.json();
        if (!data.values || data.values.length < 2) throw new Error("預測表無數據");
        for (let i = 1; i < data.values.length; i++) {
            const row = data.values[i];
            if (row.length < 6) continue;
            const mode = row[2];
            const recStr = row[4];
            const issueKey = row[5];
            if (!issueKey) continue;
            const result = resultMap.get(issueKey);
            if (!result) continue;
            const rec = parseRecommendations(recStr, mode);
            if (!rec) continue;
            predictions.push({
                mode, rec, resultNumbers: result.numbers
            });
        }
        console.log(`用戶預測載入完成，共 ${predictions.length} 筆有效匹配`);
    }

    function computeStats() {
        let singleHitDist = [0,0,0,0,0,0,0];
        let singleTotal = 0;
        let replicaHitDist = [0,0,0,0,0,0,0];
        let replicaTotal = 0;
        let danHitDist = [0,0,0];
        let tuoHitDist = [0,0,0,0,0,0,0];
        let dantuoTotal = 0;

        for (let p of predictions) {
            const mode = p.mode;
            const resultNums = p.resultNumbers;
            if (mode === 'single') {
                for (let ticket of p.rec) {
                    const hit = ticket.filter(n => resultNums.includes(n)).length;
                    if (hit >=0 && hit<=6) singleHitDist[hit]++;
                    singleTotal++;
                }
            } else if (mode === 'replica') {
                const recNums = p.rec;
                const hit = recNums.filter(n => resultNums.includes(n)).length;
                if (hit>=0 && hit<=6) replicaHitDist[hit]++;
                replicaTotal++;
            } else if (mode === 'dantuo') {
                const { dan, tuo } = p.rec;
                const danHit = dan.filter(n => resultNums.includes(n)).length;
                const tuoHit = tuo.filter(n => resultNums.includes(n)).length;
                if (danHit>=0 && danHit<=2) danHitDist[danHit]++;
                if (tuoHit>=0 && tuoHit<=6) tuoHitDist[tuoHit]++;
                dantuoTotal++;
            }
        }
        return { single: { dist: singleHitDist, total: singleTotal }, replica: { dist: replicaHitDist, total: replicaTotal }, dantuo: { danDist: danHitDist, tuoDist: tuoHitDist, total: dantuoTotal } };
    }

    function renderStats(stats) {
        const single = stats.single;
        const replica = stats.replica;
        const dantuo = stats.dantuo;

        const singleRate3Plus = single.total ? (single.dist.slice(3).reduce((a,b)=>a+b,0) / single.total * 100).toFixed(2) : '0';
        const singlePercent = single.dist.map(c => single.total ? (c / single.total * 100).toFixed(1) : '0');

        const replicaAvgHit = replica.total ? (replica.dist.reduce((s,c,i)=>s+c*i,0) / replica.total).toFixed(2) : '0';
        const replicaAtLeast3 = replica.dist.slice(3).reduce((a,b)=>a+b,0);
        const replicaRate3Plus = replica.total ? (replicaAtLeast3 / replica.total * 100).toFixed(2) : '0';

        const danAvgHit = dantuo.total ? (dantuo.danDist.reduce((s,c,i)=>s+c*i,0) / dantuo.total).toFixed(2) : '0';
        const tuoAvgHit = dantuo.total ? (dantuo.tuoDist.reduce((s,c,i)=>s+c*i,0) / dantuo.total).toFixed(2) : '0';
        const danAtLeast1 = dantuo.danDist.slice(1).reduce((a,b)=>a+b,0);
        const danRate1Plus = dantuo.total ? (danAtLeast1 / dantuo.total * 100).toFixed(2) : '0';

        // 輔助函數：確保陣列長度為 7
        function ensureLen7(arr) {
            const res = [...arr];
            while (res.length < 7) res.push(0);
            return res.slice(0,7);
        }
        const replicaDist7 = ensureLen7(replica.dist);
        const tuoDist7 = ensureLen7(dantuo.tuoDist);
        const danDist3 = [...dantuo.danDist]; while(danDist3.length<3) danDist3.push(0);

        const html = `
            <div class="card">
                <h3>📌 單式 (用戶生成注)</h3>
                <p>總注數：<strong>${single.total}</strong> &nbsp; | &nbsp; 🎯 至少中3個號碼的比例：<span class="metric">${singleRate3Plus}%</span></p>
                <table><thead><tr><th>命中個數</th><th>0</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th></tr></thead>
                <tbody><tr><td><strong>注數</strong></td>${single.dist.map(c=>`<td>${c}</td>`).join('')}</tr>
                <tr><td><strong>百分比</strong></td>${singlePercent.map(p=>`<td>${p}%</td>`).join('')}</tr></tbody></table>
                <div class="info-note">註：每注命中3個以上即為有獎（七獎$40）</div>
            </div>
            <div class="card">
                <h3>🔢 複式 (推薦N碼)</h3>
                <p>總生成次數：<strong>${replica.total}</strong> &nbsp; | &nbsp; 📊 平均包含中獎號碼數：<span class="metric">${replicaAvgHit}</span> / 6 &nbsp; | &nbsp; 🎯 包含至少3個中獎號碼的比例：<span class="metric">${replicaRate3Plus}%</span></p>
                <table><thead><tr><th>命中個數</th><th>0</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th></tr></thead>
                <tbody><tr>${replicaDist7.map(c=>`<td>${c}</td>`).join('')}</tr></tbody></table>
                <canvas id="replicaChart"></canvas>
            </div>
            <div class="card">
                <h3>🎯 膽拖</h3>
                <p>總生成次數：<strong>${dantuo.total}</strong></p>
                <p>🎯 膽碼平均命中數：<span class="metric">${danAvgHit}</span> / 2 &nbsp; | &nbsp; 膽碼命中≥1的比例：${danRate1Plus}%</p>
                <p>🎲 拖碼平均命中數：<span class="metric">${tuoAvgHit}</span> / 6</p>
                <table><thead><tr><th>膽碼命中</th><th>0</th><th>1</th><th>2</th></tr></thead>
                <tbody><tr>${danDist3.map(c=>`<td>${c}</td>`).join('')}</tr></tbody></table>
                <table style="margin-top:12px"><thead><tr><th>拖碼命中</th><th>0</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th></tr></thead>
                <tbody><tr>${tuoDist7.map(c=>`<td>${c}</td>`).join('')}</tr></tbody></table>
                <canvas id="dantuoChart"></canvas>
            </div>
            <div class="info-note">✅ 統計基於 ${predictions.length} 筆用戶預測記錄（匹配到開獎結果）。更新時間：${new Date().toLocaleString()}</div>
        `;
        document.getElementById('accuracyContent').innerHTML = html;
        document.getElementById('updateTime').innerText = `最後更新：${new Date().toLocaleString()}`;

        if (replica.total) {
            new Chart(document.getElementById('replicaChart'), {
                type: 'bar', data: { labels: ['0','1','2','3','4','5','6'], datasets: [{ label: '次數', data: replicaDist7, backgroundColor: '#3b82f6' }] },
                options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, title: { display: true, text: '期數' } }, x: { title: { display: true, text: '命中正碼個數' } } } }
            });
        }
        if (dantuo.total) {
            new Chart(document.getElementById('dantuoChart'), {
                type: 'bar', data: { labels: ['0','1','2'], datasets: [{ label: '膽碼命中', data: danDist3, backgroundColor: '#f97316' }, { label: '拖碼命中 (0~6)', data: tuoDist7, backgroundColor: '#10b981' }] },
                options: { responsive: true, plugins: { legend: { position: 'top' } }, scales: { y: { beginAtZero: true, title: { display: true, text: '次數' } } } }
            });
        }
    }

    async function init() {
        try {
            await loadResults();
            await loadPredictions();
            if (predictions.length === 0) throw new Error("沒有可匹配的預測記錄");
            const stats = computeStats();
            renderStats(stats);
        } catch (err) {
            document.getElementById('accuracyContent').innerHTML = `<div class="card error-box">❌ 分析失敗：${err.message}</div>`;
        }
    }
    init();
</script>
</body>
</html>
