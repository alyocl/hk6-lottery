// ==================== 讀取 Google Sheets (修正：包含期號) ====================
async function loadCsvData() {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${RANGE}?key=${API_KEY}`;
    try {
        console.log("正在讀取:", url);
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) {
            const err = await response.json();
            throw new Error(`API ${response.status}: ${err.error?.message || '未知錯誤'}`);
        }
        const data = await response.json();
        if (!data.values || data.values.length < 2) throw new Error("試算表中沒有數據");
        const records = [];
        for (let i = 1; i < data.values.length; i++) {
            const row = data.values[i];
            if (row.length < 8) continue;
            const issue = row[0].trim();
            const n1 = parseInt(row[1], 10);
            const n2 = parseInt(row[2], 10);
            const n3 = parseInt(row[3], 10);
            const n4 = parseInt(row[4], 10);
            const n5 = parseInt(row[5], 10);
            const n6 = parseInt(row[6], 10);
            const special = parseInt(row[7], 10);
            if (isNaN(n1) || isNaN(n2) || isNaN(n3) || isNaN(n4) || isNaN(n5) || isNaN(n6) || isNaN(special)) continue;
            records.push({ issue, n1, n2, n3, n4, n5, n6, special });
        }
        if (records.length === 0) throw new Error("沒有有效號碼");
        console.log(`成功載入 ${records.length} 期數據，最新期號：${records[0].issue}`);
        if (records.length > 180) records.length = 180;
        currentIssueKey = getIssueKey(records);
        return records;
    } catch (err) {
        console.error("載入失敗:", err);
        return null;
    }
}

// ==================== 核心預測演算法 ====================
function getScores(dataSeries, currentIdx) {
    const score = new Array(50).fill(0);
    const { lookback, decay_lambda, cold_threshold, hot_boost, extreme_cold_penalty } = MODEL_CONFIG;
    
    // 1. 指數衰減權重 (短期為主，長期為輔)
    const start = Math.max(0, currentIdx - lookback);
    for (let offset = 0; offset < currentIdx - start; offset++) {
        const t = start + offset;
        const age = currentIdx - t - 1;
        const w = Math.exp(-decay_lambda * age);   // 越近期權重越高
        const row = dataSeries[t];
        for (let col of ['n1','n2','n3','n4','n5','n6']) {
            score[row[col]] += w;
        }
    }

    // 2. 冷號處理：使用二次指數，超過門檻後緩慢加分，但超過20期反倒扣分
    const lastSeen = new Array(50).fill(-1);
    for (let t = currentIdx-1; t >= 0; t--) {
        const row = dataSeries[t];
        for (let col of ['n1','n2','n3','n4','n5','n6']) {
            const num = row[col];
            if (lastSeen[num] === -1) lastSeen[num] = t;
        }
    }
    const coldScore = new Array(50).fill(0);
    for (let i=1;i<=49;i++) {
        const d = (lastSeen[i] === -1) ? 999 : (currentIdx - lastSeen[i] - 1);
        if (d > cold_threshold && d <= 20) {
            coldScore[i] = 0.5 * Math.log(d - cold_threshold + 1);   // 緩增
        } else if (d > 20) {
            coldScore[i] = -extreme_cold_penalty;   // 超過20期未出，降權
        }
    }

    // 3. 熱號加權：最近3期內出現次數加權 (提高短期重要性)
    const hotScore = new Array(50).fill(0);
    for (let i=1;i<=49;i++) {
        let cnt = 0;
        const checkPeriods = Math.min(3, currentIdx);
        for (let t = currentIdx-checkPeriods; t < currentIdx; t++) {
            const row = dataSeries[t];
            if ([row.n1,row.n2,row.n3,row.n4,row.n5,row.n6].includes(i)) cnt++;
        }
        if (cnt > 0) hotScore[i] = hot_boost * cnt;
    }

    // 4. 移除 avoidScore (不再懲罰小號區間，也不加倍懲罰上期號碼)
    // 改為：輕微鼓勵「鄰近區間」(可選，目前先不做)

    // 最終綜合分數 (提高短期權重佔比)
    const final = new Array(50);
    for (let i=0;i<=49;i++) {
        final[i] = 0.45 * score[i] + 0.15 * coldScore[i] + 0.40 * hotScore[i];
    }
    return final;
}
function getTopNumbers(dataSeries, count, exclude = []) {
    const currentIdx = dataSeries.length;
    const final = getScores(dataSeries, currentIdx);
    let candidates = Array.from({length:49}, (_,i)=>i+1);
    candidates = candidates.filter(c => !exclude.includes(c));
    candidates.sort((a,b)=> final[b] - final[a]);
    return candidates.slice(0, count).sort((a,b)=>a-b);
}
function combination(n, k) {
    if (k > n) return 0;
    let result = 1;
    for (let i = 1; i <= k; i++) result = result * (n - k + i) / i;
    return Math.round(result);
}
function predictTicketsFixed(dataSeries, nTickets) {
    const currentIdx = dataSeries.length;
    const final = getScores(dataSeries, currentIdx);
    
    // 取得所有號碼按分數排序
    let candidates = Array.from({length:49}, (_,i)=>i+1);
    candidates.sort((a,b)=> final[b] - final[a]);
    
    // 取前 12 名作為核心池 (分數最高的12個號碼)
    const corePool = candidates.slice(0, 12);
    
    const tickets = [];
    // 生成 nTickets 注，每注從核心池中按分數加權選出6個不重複號碼
    for (let t = 0; t < nTickets; t++) {
        let pool = [...corePool];
        let weights = pool.map(v => Math.max(final[v], 0.01));
        let selected = [];
        for (let s = 0; s < 6; s++) {
            let total = weights.reduce((a,b)=>a+b,0);
            let rand = Math.random() * total;
            let idx = 0, acc = 0;
            while (acc + weights[idx] < rand && idx < weights.length-1) {
                acc += weights[idx];
                idx++;
            }
            selected.push(pool[idx]);
            pool.splice(idx,1);
            weights.splice(idx,1);
        }
        selected.sort((a,b)=>a-b);
        tickets.push(selected);
    }
    return tickets;
}

</div>`;
}
    const html = `

                <strong>✨ 最新一期 ${latest.issue}</strong><br>
                <div>
                    <span class="number-ball ${getBallClass(latest.n1)}">${latest.n1}</span>
                    <span class="number-ball ${getBallClass(latest.n2)}">${latest.n2}</span>
                    <span class="number-ball ${getBallClass(latest.n3)}">${latest.n3}</span>
                    <span class="number-ball ${getBallClass(latest.n4)}">${latest.n4}</span>
                    <span class="number-ball ${getBallClass(latest.n5)}">${latest.n5}</span>
                    <span class="number-ball ${getBallClass(latest.n6)}">${latest.n6}</span>

                    <span class="number-ball ${getBallClass(latest.special)}">${latest.special}</span>

                <option value="3">3 注</option><option value="4" selected>4 注</option>
            </select>
        </div>
        <div class="card" id="resultPanel"><div style="text-align:center;">⚡ 點擊下方按鈕生成預測</div></div>
        <button id="predictBtn">🔮 開始預測</button>
    `;
    document.getElementById('mainApp').innerHTML = html;
    
document.getElementById('predictBtn').onclick = () => {
    const betVal = parseInt(document.getElementById('betSelect').value);
    const params = { betCount: betVal };
    
    // 1. 檢查是否已有相同記錄（同一期、同一玩法、同一注數）
    let existingEntry = null;
    for (let [code, rec] of Object.entries(checkRecords)) {
        if (rec.mode === 'single' && rec.issue === currentIssueKey && JSON.stringify(rec.params) === JSON.stringify(params)) {
            existingEntry = { code, data: rec.data };
            break;
        }
    }
    
    let tickets, result;
    if (existingEntry) {
        // 已有記錄：直接使用儲存的號碼，核對碼沿用舊的
        tickets = existingEntry.data;
        result = { code: existingEntry.code, isNew: false };
    } else {
        // 無記錄：生成新預測並儲存
        tickets = predictTicketsFixed(rawData, betVal);
        result = savePrediction('single', params, tickets);
    }
    
    // 2. 顯示結果（與原來相同）
    let alertHtml = '';
    if (!result.isNew) {
        alertHtml = `<div class="code-box" style="background:#fef3c7; border-color:#f97316;">
                        ⚠️ 本期已預測 祝你好運<br>
                        📌 核對碼：<span class="code" style="font-size:1.2rem;">${result.code}</span>
                    </div>`;
    }
    let resultHtml = `<div><strong>🎯 預測 ${betVal} 注</strong></div>`;
    tickets.forEach((t, i) => resultHtml += `<div class="ticket-row">注 ${i+1}： ${t.join(', ')}</div>`);
    if (result.isNew) {
        resultHtml += `<div class="code-box"><div>📌 您的核對碼</div><div class="code">${result.code}</div><div style="font-size:0.8rem;">💡 開獎後到「核對中獎」輸入此碼</div></div>`;
    } else {
        resultHtml += alertHtml;
    }
    document.getElementById('resultPanel').innerHTML = resultHtml;
};
}

async function renderDanTuo() {

        return;
    }

        <div class="card">
            <div class="row-2cols"><div class="col"><label>🎲 膽數量：</label><select id="danCountSelect">${danOptions}</select></div>
            <div class="col"><label>📊 配腳數量：</label><select id="tuoCountSelect"></select><div id="tuoHint" class="info-text"></div></div></div>

        const danCount = parseInt(document.getElementById('danCountSelect').value);
        const minTuo = 7 - danCount;
        const maxTuo = 49 - danCount;
        let opts = "";
        for (let i = minTuo; i <= maxTuo; i++) opts += `<option value="${i}">${i} 個配腳</option>`;
        document.getElementById('tuoCountSelect').innerHTML = opts;
        document.getElementById('tuoHint').innerHTML = `最少 ${minTuo} 個，最多 ${maxTuo} 個 (總號碼 ≥ 7)`;

    let currentPrice = 10;
    document.getElementById('danPrice10Btn').classList.add('active');
    document.getElementById('danPrice5Btn').onclick = () => { currentPrice = 5; document.getElementById('danPrice5Btn').classList.add('active'); document.getElementById('danPrice10Btn').classList.remove('active'); };
    document.getElementById('danPrice10Btn').onclick = () => { currentPrice = 10; document.getElementById('danPrice10Btn').classList.add('active'); document.getElementById('danPrice5Btn').classList.remove('active'); };
    document.getElementById('danCountSelect').onchange = updateTuo;
    
    document.getElementById('generateDanTuoBtn').onclick = () => {
        const danCount = parseInt(document.getElementById('danCountSelect').value);
        const tuoCount = parseInt(document.getElementById('tuoCountSelect').value);
        const danNumbers = getTopNumbers(rawData, danCount);
        const tuoNumbers = getTopNumbers(rawData, tuoCount, danNumbers);
        const needFromTuo = 6 - danCount;
        const comboCount = combination(tuoCount, needFromTuo);
        const totalAmount = comboCount * currentPrice;
        const result = savePrediction('dantuo', { danCount, tuoCount, price: currentPrice }, { dan: danNumbers, tuo: tuoNumbers });
        
        let alertHtml = '';
        if (!result.isNew) {
            alertHtml = `<div class="code-box" style="background:#fef3c7; border-color:#f97316;">
                            ⚠️ 本期已推薦 祝你好運<br>
                            📌 核對碼：<span class="code" style="font-size:1.2rem;">${result.code}</span>
                        </div>`;
        }
        
        let danHtml = `<div class="combo-info" style="background:#fef9c3;"><strong>🎯 膽 </strong><br>`;
        danNumbers.forEach(n => danHtml += `<span class="number-badge" style="background:#f97316;">${n}</span>`);
        danHtml += `</div><div class="combo-info"><strong>📌 配腳 </strong><br>`;
        tuoNumbers.forEach(n => danHtml += `<span class="number-badge">${n}</span>`);
        danHtml += `</div><div class="combo-info">C(${tuoCount},${needFromTuo}) = ${comboCount.toLocaleString()} 注<br><strong>總金額：$${totalAmount.toLocaleString()}</strong></div>`;
        
        if (result.isNew) {
            danHtml += `<div class="code-box"><div>📌 您的核對碼</div><div class="code">${result.code}</div><div style="font-size:0.8rem;">💡 開獎後到「核對中獎」輸入此碼</div></div>`;
        } else {
            danHtml += alertHtml;
        }
        
        document.getElementById('danTuoResultPanel').innerHTML = danHtml;
        document.getElementById('danTuoResultPanel').classList.remove('hidden');
    };
    updateTuo();
}

// ==================== 核對中獎模式 ====================
async function renderCheck() {
    loadCheckRecords();
    const THREE_MONTHS_MS = 90 * 24 * 60 * 60 * 1000;
    const now = Date.now();
    let cleanedCount = 0;
    for (let code in checkRecords) {
        const timestamp = new Date(checkRecords[code].timestamp).getTime();
        if (now - timestamp > THREE_MONTHS_MS) {
            delete checkRecords[code];
            cleanedCount++;
        }
    }
    if (cleanedCount > 0) saveCheckRecords();
    
    let historyHtml = '';
    const list = Object.entries(checkRecords).reverse();
    if (list.length === 0) {
        historyHtml = '<div style="text-align:center; color:#666;">📭 暫無核對記錄（系統只保留最近3個月）</div>';
    } else {
        for (let [code, rec] of list) {
            let modeName = rec.mode === 'single' ? '單式' : (rec.mode === 'replica' ? '複式' : '膽拖');
            let details = rec.mode === 'single' ? `${rec.params.betCount}注` : (rec.mode === 'replica' ? `${rec.params.count}個字` : `${rec.params.danCount}膽+${rec.params.tuoCount}腳`);
            const daysOld = Math.floor((now - new Date(rec.timestamp).getTime()) / (24*60*60*1000));
            const daysLeft = 90 - daysOld;
            historyHtml += `<div class="history-item">
                <strong>🔑 ${code}</strong> - ${modeName} (${details})<br>
                <span style="font-size:0.75rem;">📅 ${new Date(rec.timestamp).toLocaleString()} · 剩餘 ${daysLeft} 天</span>
                ${rec.checked ? '<span style="float:right; color:#10b981;">✅ 已核對</span>' : ''}
            </div>`;
        }
    }
    const infoHtml = `<div style="background:#eef2ff; border-radius:1rem; padding:0.8rem; margin-bottom:1rem; text-align:center; font-size:0.8rem;">
        ⏰ 系統只保留 <strong>最近3個月</strong> 的核對記錄，超過90天會自動清除。
    </div>`;
    
    const html = `
        <div class="card">
            <div><strong>🔍 輸入核對碼與開獎號碼</strong></div>
            <div class="bet-selector"><label>📌 核對碼：</label><input type="text" id="checkCode" placeholder="例如 A3B9X7" style="padding:10px; width:150px; text-align:center;"></div>
            <div class="bet-selector"><label>🎲 攪出號碼 (6個)：</label><input type="text" id="drawNumbers" placeholder="5,18,22,31,44,48" style="width:100%; padding:10px;"></div>
            <div class="bet-selector"><label>⭐ 特別號碼 (1個)：</label><input type="text" id="specialNumber" placeholder="9" style="width:100%; padding:10px;"></div>
            <button id="doCheckBtn">🔍 核對中獎</button>
            <div id="checkResult"></div>
        </div>
        <div class="card">
            <strong>📋 您的核對記錄 (最近3個月)</strong>
            ${infoHtml}
            <div style="max-height:300px; overflow-y:auto; margin-top:10px;">${historyHtml}</div>
        </div>
    `;
    document.getElementById('mainApp').innerHTML = html;
    
    document.getElementById('doCheckBtn').onclick = () => {
        const code = document.getElementById('checkCode').value.trim().toUpperCase();
        const drawInput = document.getElementById('drawNumbers').value.trim();
        const specialInput = document.getElementById('specialNumber').value.trim();
        if (!code) { alert('請輸入核對碼'); return; }
        if (!drawInput) { alert('請輸入攪出號碼'); return; }
        if (!specialInput) { alert('請輸入特別號碼'); return; }
        const drawNumbers = drawInput.split(',').map(n => parseInt(n.trim(), 10));
        const specialNumber = parseInt(specialInput, 10);
        if (drawNumbers.length !== 6 || drawNumbers.some(isNaN)) { alert('請輸入6個攪出號碼，用逗號分隔'); return; }
        if (isNaN(specialNumber) || specialNumber < 1 || specialNumber > 49) { alert('請輸入1-49之間的特別號碼'); return; }
        
        const record = checkRecords[code];
        if (!record) {
            document.getElementById('checkResult').innerHTML = `<div class="error-box">❌ 核對碼無效<br><span style="font-size:0.8rem;">可能原因：核對碼錯誤、記錄已超過3個月被清除</span></div>`;
            return;
        }
        const THREE_MONTHS_MS = 90 * 24 * 60 * 60 * 1000;
        const now = Date.now();
        const timestamp = new Date(record.timestamp).getTime();
        if (now - timestamp > THREE_MONTHS_MS) {
            delete checkRecords[code];
            saveCheckRecords();
            document.getElementById('checkResult').innerHTML = `<div class="error-box">❌ 此核對碼記錄已超過3個月，已被系統自動清除，無法核對</div>`;
            setTimeout(() => renderCheck(), 1500);
            return;
        }
        
        let resultHtml = `<div class="code-box" style="background:#d1fae5;">`;
        resultHtml += `<div>🎯 核對結果</div>`;
        
        if (record.mode === 'single') {
            let anyPrize = false;
            const hasSpecialMatch = (record.special === specialNumber);
            for (let i = 0; i < record.data.length; i++) {
                const ticket = record.data[i];
                const hitNumbers = ticket.filter(n => drawNumbers.includes(n));
                const hitCount = hitNumbers.length;
                let prizeText = '';
                if (hitCount === 6) { prizeText = '🏆 頭獎'; anyPrize = true; }
                else if (hitCount === 5 && hasSpecialMatch) { prizeText = '🎉 二獎'; anyPrize = true; }
                else if (hitCount === 5) { prizeText = '🎉 三獎'; anyPrize = true; }
                else if (hitCount === 4 && hasSpecialMatch) { prizeText = '🎉 四獎 ($9,600)'; anyPrize = true; }
                else if (hitCount === 4) { prizeText = '🎉 五獎 ($640)'; anyPrize = true; }
                else if (hitCount === 3 && hasSpecialMatch) { prizeText = '🎉 六獎 ($320)'; anyPrize = true; }
                else if (hitCount === 3) { prizeText = '🎉 七獎 ($40)'; anyPrize = true; }
                else { prizeText = '未中獎'; }
                const hitDisplay = hitNumbers.length ? hitNumbers.join(', ') : '無';
                resultHtml += `<div>📌 注 ${i+1}：中獎號碼 ${hitDisplay} → ${prizeText}</div>`;
            }
            if (!anyPrize && !hasSpecialMatch) {
                resultHtml += `<div>❌ 未中獎</div>`;
            } else if (!anyPrize && hasSpecialMatch) {
                resultHtml += `<div>⚠️ 僅中特別號碼（無派彩）</div>`;
            }
        } 
        else if (record.mode === 'replica') {
            const recommendedNumbers = record.data.slice();
            const hitNumbers = [...new Set(recommendedNumbers.filter(n => drawNumbers.includes(n)))];
            const matchCount = hitNumbers.length;
            let prizeText = '';
            if (matchCount >= 6) prizeText = '🏆 恭喜中頭獎！';
            else if (matchCount === 5) prizeText = '🎉 中三獎';
            else if (matchCount === 4) prizeText = '🎉 中五獎 ($640)';
            else if (matchCount === 3) prizeText = '🎉 中七獎 ($40)';
            else prizeText = '❌ 未中獎';
            const hitDisplay = hitNumbers.length ? hitNumbers.join(', ') : '無';
            resultHtml += `<div>中獎預測號碼：${hitDisplay}</div>`;
            resultHtml += `<div>${prizeText}</div>`;
        } 
        else {
            const recommendedNumbers = [...record.data.dan, ...record.data.tuo];
            const hitNumbers = [...new Set(recommendedNumbers.filter(n => drawNumbers.includes(n)))];
            const mainHit = hitNumbers.length;
            const hasSpecialMatch = (record.special === specialNumber);
            let prizeText = '';
            if (mainHit === 6) prizeText = '🏆 恭喜中頭獎！';
            else if (mainHit === 5 && hasSpecialMatch) prizeText = '🎉 中二獎';
            else if (mainHit === 5) prizeText = '🎉 中三獎';
            else if (mainHit === 4 && hasSpecialMatch) prizeText = '🎉 中四獎 ($9,600)';
            else if (mainHit === 4) prizeText = '🎉 中五獎 ($640)';
            else if (mainHit === 3 && hasSpecialMatch) prizeText = '🎉 中六獎 ($320)';
            else if (mainHit === 3) prizeText = '🎉 中七獎 ($40)';
            else prizeText = '❌ 未中獎';
            const hitDisplay = hitNumbers.length ? hitNumbers.join(', ') : '無';
            resultHtml += `<div>中獎號碼：${hitDisplay}</div>`;
            resultHtml += `<div>特別號碼：${hasSpecialMatch ? '✅ 中' : '❌ 不中'}</div>`;
            resultHtml += `<div>${prizeText}</div>`;
        }
        
        resultHtml += `</div>`;
        document.getElementById('checkResult').innerHTML = resultHtml;
        record.checked = true;
        saveCheckRecords();
    };
}

// ==================== 切換模式 ====================
function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-tab').forEach((tab, idx) => {
        const modes = ['single', 'replica', 'danTuo', 'check'];
        tab.classList.toggle('active', modes[idx] === mode);
    });
    if (mode === 'single') renderSingle();
    else if (mode === 'replica') renderReplica();
    else if (mode === 'danTuo') renderDanTuo();
    else renderCheck();
}

// ==================== 初始化 ====================
async function init() {
    document.getElementById('mainApp').innerHTML = `<div class="card loading">📡 正在載入最新開獎數據...</div>`;
    const records = await loadCsvData();
    if (!records || records.length === 0) {
        document.getElementById('mainApp').innerHTML = `<div class="card error-box">❌ 讀取失敗，請確認 Google Sheets 已設為「知道連結的人可檢視」</div>`;
        return;
    }
    rawData = records;
    console.log("數據載入成功，共", rawData.length, "期");
    
    document.getElementById('singleModeTab').onclick = () => switchMode('single');
    document.getElementById('replicaModeTab').onclick = () => switchMode('replica');
    document.getElementById('danTuoModeTab').onclick = () => switchMode('danTuo');
    document.getElementById('checkModeTab').onclick = () => switchMode('check');
    
    loadCheckRecords();
    renderSingle();
}

init();
