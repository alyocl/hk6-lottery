<script type="module">
    import { predictTicketsFixed } from './predict.js';

    // ========== 全域變數 ==========
    const API_KEY = 'AIzaSyCmpR7qGwgfE3y7XIS-O1_cny_iBsDa7No';
    const SPREADSHEET_ID = '1N0DoSvoTjfQ_aFWkG3pOn_28MaquDSwnfiyTJqVA2Fw';
    const RANGE = 'sheet1!A:H';
    let rawData = [];
    let currentMode = "single";
    let checkRecords = {};
    let currentIssueKey = "";

    // ========== 核對碼儲存 ==========
    function loadCheckRecords() {
        const saved = localStorage.getItem('lottery_check_records');
        if (saved) try { checkRecords = JSON.parse(saved); } catch(e) {}
    }
    function saveCheckRecords() {
        localStorage.setItem('lottery_check_records', JSON.stringify(checkRecords));
    }
    function generateCheckCode() {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        let code = '';
        for (let i = 0; i < 6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
        return code;
    }
    function getIssueKey(dataSeries) {
        if (!dataSeries || dataSeries.length === 0) return "";
        const latest = dataSeries[0];
        return `${latest.n1},${latest.n2},${latest.n3},${latest.n4},${latest.n5},${latest.n6}|${latest.special}`;
    }
    function savePrediction(mode, params, data) {
        let code, isNew;
        const existingEntry = Object.entries(checkRecords).find(([key, record]) => {
            return record.mode === mode && record.issue === currentIssueKey && JSON.stringify(record.params) === JSON.stringify(params);
        });
        if (existingEntry) {
            code = existingEntry[0];
            isNew = false;
        } else {
            code = generateCheckCode();
            checkRecords[code] = {
                mode, params, data, issue: currentIssueKey,
                timestamp: new Date().toISOString(), checked: false
            };
            saveCheckRecords();
            isNew = true;
        }
        // 提交到 Google Form (略，保持原有)
        const FORM_ACTION = 'https://docs.google.com/forms/d/e/1FAIpQLSeYkeOO3JHFx7lIz-4YjF3yQ7eHUQHPh2QRQDleD0jnYS_mhQ/formResponse';
        const iframe = document.createElement('iframe');
        iframe.name = 'hidden-frame';
        iframe.style.display = 'none';
        document.body.appendChild(iframe);
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = FORM_ACTION;
        form.target = 'hidden-frame';
        form.style.display = 'none';
        const fieldMapping = {
            'entry.497469535': code,
            'entry.2130058932': mode,
            'entry.932982564': JSON.stringify(params),
            'entry.1578146059': JSON.stringify(data),
            'entry.1684128741': currentIssueKey
        };
        for (const [name, value] of Object.entries(fieldMapping)) {
            const input = document.createElement('input');
            input.type = 'text';
            input.name = name;
            input.value = value;
            form.appendChild(input);
        }
        document.body.appendChild(form);
        form.submit();
        setTimeout(() => {
            if (document.body.contains(iframe)) document.body.removeChild(iframe);
            if (document.body.contains(form)) document.body.removeChild(form);
        }, 3000);
        return { code, isNew };
    }

    // ========== 號碼球顏色 ==========
    function getBallClass(num) {
        const red = [1,2,7,8,12,13,18,19,23,24,29,30,34,35,40,45,46];
        const blue = [3,4,9,10,14,15,20,25,26,31,36,37,41,42,47,48];
        const green = [5,6,11,16,17,21,22,27,28,32,33,38,39,43,44,49];
        if (red.includes(num)) return 'ball-red';
        if (blue.includes(num)) return 'ball-blue';
        if (green.includes(num)) return 'ball-green';
        return 'ball-gray';
    }

    // ========== 讀取 Google Sheets ==========
    async function loadCsvData() {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${RANGE}?key=${API_KEY}`;
        try {
            const response = await fetch(url, { cache: "no-store" });
            if (!response.ok) throw new Error(`API ${response.status}`);
            const data = await response.json();
            if (!data.values || data.values.length < 2) throw new Error("無數據");
            const records = [];
            for (let i = 1; i < data.values.length; i++) {
                const row = data.values[i];
                if (row.length < 8) continue;
                const issue = row[0].trim();
                const n1 = parseInt(row[1]), n2 = parseInt(row[2]), n3 = parseInt(row[3]);
                const n4 = parseInt(row[4]), n5 = parseInt(row[5]), n6 = parseInt(row[6]);
                const special = parseInt(row[7]);
                if (isNaN(n1+n2+n3+n4+n5+n6+special)) continue;
                records.push({ issue, n1, n2, n3, n4, n5, n6, special });
            }
            if (records.length === 0) throw new Error("沒有有效號碼");
            if (records.length > 180) records.length = 180;
            currentIssueKey = getIssueKey(records);
            return records;
        } catch (err) {
            console.error(err);
            return null;
        }
    }

    function combination(n, k) {
        if (k > n) return 0;
        let result = 1;
        for (let i = 1; i <= k; i++) result = result * (n - k + i) / i;
        return Math.round(result);
    }

    // ========== 單式模式 ==========
    async function renderSingle() {
        if (!rawData || rawData.length === 0) {
            document.getElementById('mainApp').innerHTML = `<div class="card error-box">❌ 數據載入失敗</div>`;
            return;
        }
        const latest = rawData[0];
        let recentHtml = '';
        for (let i=0; i<Math.min(5, rawData.length); i++) {
            const r = rawData[i];
            recentHtml += `<div class="recent-item">
                <strong>${r.issue}</strong> ${r.n1},${r.n2},${r.n3},${r.n4},${r.n5},${r.n6}
                <span style="margin-left:8px;">特別號</span>
                <span style="display:inline-block; width:2rem; text-align:center; font-weight:bold;">${r.special}</span>
            </div>`;
        }
        const html = `
            <div class="card">
                <div class="latest-box">
                    <strong>✨ 最新一期 ${latest.issue}</strong><br>
                    <div>${[latest.n1,latest.n2,latest.n3,latest.n4,latest.n5,latest.n6].map(n => `<span class="number-ball ${getBallClass(n)}">${n}</span>`).join('')}
                        <span style="margin-left:8px;">特別號</span>
                        <span class="number-ball ${getBallClass(latest.special)}">${latest.special}</span>
                    </div>
                </div>
                <div><strong>📜 最近5期</strong><br>${recentHtml}</div>
            </div>
            <div class="bet-selector">
                <label>🎲 選擇注數：</label>
                <select id="betSelect">
                    <option value="1">1 注</option><option value="2">2 注</option>
                    <option value="3">3 注</option><option value="4" selected>4 注</option>
                </select>
            </div>
            <div class="card" id="resultPanel"><div style="text-align:center;">⚡ 點擊下方按鈕生成預測</div></div>
            <button id="predictBtn">🔮 開始預測</button>
        `;
        document.getElementById('mainApp').innerHTML = html;
        
        document.getElementById('predictBtn').onclick = () => {
            const betVal = parseInt(document.getElementById('betSelect').value);
            const params = { betCount: betVal };
            let existingEntry = null;
            for (let [code, rec] of Object.entries(checkRecords)) {
                if (rec.mode === 'single' && rec.issue === currentIssueKey && JSON.stringify(rec.params) === JSON.stringify(params)) {
                    existingEntry = { code, data: rec.data };
                    break;
                }
            }
            let tickets, result;
            if (existingEntry) {
                tickets = existingEntry.data;
                result = { code: existingEntry.code, isNew: false };
            } else {
                tickets = predictTicketsFixed(rawData, betVal);
                result = savePrediction('single', params, tickets);
            }
            let alertHtml = '';
            if (!result.isNew) {
                alertHtml = `<div class="code-box" style="background:#fef3c7; border-color:#f97316;">
                                ⚠️ 本期已預測 祝你好運<br>📌 核對碼：<span class="code" style="font-size:1.2rem;">${result.code}</span>
                            </div>`;
            }
            let resultHtml = `<div><strong>🎯 預測 ${betVal} 注</strong></div>`;
            tickets.forEach((t,i) => resultHtml += `<div class="ticket-row">注 ${i+1}： ${t.join(', ')}</div>`);
            if (result.isNew) {
                resultHtml += `<div class="code-box"><div>📌 您的核對碼</div><div class="code">${result.code}</div><div style="font-size:0.8rem;">💡 開獎後到「核對中獎」輸入此碼</div></div>`;
            } else {
                resultHtml += alertHtml;
            }
            document.getElementById('resultPanel').innerHTML = resultHtml;
        };
    }

    // ========== 複式模式 (簡單版) ==========
    async function renderReplica() {
        if (!rawData || rawData.length === 0) {
            document.getElementById('mainApp').innerHTML = `<div class="card error-box">❌ 數據載入失敗</div>`;
            return;
        }
        let selectOptions = "";
        for (let i = 7; i <= 20; i++) selectOptions += `<option value="${i}">${i} 個字</option>`;
        const html = `
            <div class="card">
                <div class="bet-selector"><label>📊 選擇號碼數量：</label><select id="replicaCountSelect">${selectOptions}</select></div>
                <div class="price-buttons"><button id="price5Btn" class="price-btn">$5 / 注</button><button id="price10Btn" class="price-btn active">$10 / 注</button></div>
                <button id="generateReplicaBtn">🔮 開始預測</button>
            </div>
            <div class="card hidden" id="replicaResultPanel"></div>
        `;
        document.getElementById('mainApp').innerHTML = html;
        let currentPrice = 10;
        document.getElementById('price10Btn').classList.add('active');
        document.getElementById('price5Btn').onclick = () => { currentPrice = 5; document.getElementById('price5Btn').classList.add('active'); document.getElementById('price10Btn').classList.remove('active'); };
        document.getElementById('price10Btn').onclick = () => { currentPrice = 10; document.getElementById('price10Btn').classList.add('active'); document.getElementById('price5Btn').classList.remove('active'); };
        
        function getTopNumbersFallback(dataSeries, count, exclude = []) {
            const freq = new Array(50).fill(0);
            for (let i=0; i<dataSeries.length; i++) {
                const row = dataSeries[i];
                for (let col of ['n1','n2','n3','n4','n5','n6']) freq[row[col]]++;
            }
            let candidates = Array.from({length:49}, (_,i)=>i+1);
            candidates = candidates.filter(c => !exclude.includes(c));
            candidates.sort((a,b) => freq[b] - freq[a]);
            return candidates.slice(0, count).sort((a,b)=>a-b);
        }
        const getTopNumbers = getTopNumbersFallback;
        
        document.getElementById('generateReplicaBtn').onclick = () => {
            const count = parseInt(document.getElementById('replicaCountSelect').value);
            const topNumbers = getTopNumbers(rawData, count);
            const comboCount = combination(count, 6);
            const totalAmount = comboCount * currentPrice;
            const result = savePrediction('replica', { count, price: currentPrice }, topNumbers);
            let alertHtml = '';
            if (!result.isNew) {
                alertHtml = `<div class="code-box" style="background:#fef3c7; border-color:#f97316;"><div>⚠️ 本期已推薦 祝你好運</div><div>📌 核對碼：${result.code}</div></div>`;
            }
            let numbersHtml = `<div class="combo-info"><strong>🎲 推薦 ${count} 個號碼</strong><br>${topNumbers.map(n => `<span class="number-badge">${n}</span>`).join('')}</div><div class="combo-info">C(${count},6) = ${comboCount.toLocaleString()} 注<br><strong>總金額：$${totalAmount.toLocaleString()}</strong></div>`;
            if (result.isNew) numbersHtml += `<div class="code-box"><div>📌 您的核對碼</div><div class="code">${result.code}</div><div style="font-size:0.8rem;">💡 開獎後到「核對中獎」輸入此碼</div></div>`;
            else numbersHtml += alertHtml;
            document.getElementById('replicaResultPanel').innerHTML = numbersHtml;
            document.getElementById('replicaResultPanel').classList.remove('hidden');
        };
    }

    // ========== 膽拖模式 (簡單版) ==========
    async function renderDanTuo() {
        if (!rawData || rawData.length === 0) {
            document.getElementById('mainApp').innerHTML = `<div class="card error-box">❌ 數據載入失敗</div>`;
            return;
        }
        let danOptions = "";
        for (let i = 1; i <= 5; i++) danOptions += `<option value="${i}">${i} 個膽</option>`;
        const html = `
            <div class="card">
                <div class="row-2cols"><div class="col"><label>🎲 膽數量：</label><select id="danCountSelect">${danOptions}</select></div>
                <div class="col"><label>📊 配腳數量：</label><select id="tuoCountSelect"></select><div id="tuoHint" class="info-text"></div></div></div>
                <div class="price-buttons"><button id="danPrice5Btn" class="price-btn">$5 / 注</button><button id="danPrice10Btn" class="price-btn active">$10 / 注</button></div>
                <button id="generateDanTuoBtn">🔮 開始預測</button>
            </div>
            <div class="card hidden" id="danTuoResultPanel"></div>
        `;
        document.getElementById('mainApp').innerHTML = html;
        function updateTuo() {
            const danCount = parseInt(document.getElementById('danCountSelect').value);
            const minTuo = 7 - danCount;
            const maxTuo = 49 - danCount;
            let opts = "";
            for (let i = minTuo; i <= maxTuo; i++) opts += `<option value="${i}">${i} 個配腳</option>`;
            document.getElementById('tuoCountSelect').innerHTML = opts;
            document.getElementById('tuoHint').innerHTML = `最少 ${minTuo} 個，最多 ${maxTuo} 個 (總號碼 ≥ 7)`;
        }
        let currentPrice = 10;
        document.getElementById('danPrice10Btn').classList.add('active');
        document.getElementById('danPrice5Btn').onclick = () => { currentPrice = 5; document.getElementById('danPrice5Btn').classList.add('active'); document.getElementById('danPrice10Btn').classList.remove('active'); };
        document.getElementById('danPrice10Btn').onclick = () => { currentPrice = 10; document.getElementById('danPrice10Btn').classList.add('active'); document.getElementById('danPrice5Btn').classList.remove('active'); };
        document.getElementById('danCountSelect').onchange = updateTuo;
        function getTopNumbersFallback(dataSeries, count, exclude = []) {
            const freq = new Array(50).fill(0);
            for (let i=0; i<dataSeries.length; i++) {
                const row = dataSeries[i];
                for (let col of ['n1','n2','n3','n4','n5','n6']) freq[row[col]]++;
            }
            let candidates = Array.from({length:49}, (_,i)=>i+1);
            candidates = candidates.filter(c => !exclude.includes(c));
            candidates.sort((a,b) => freq[b] - freq[a]);
            return candidates.slice(0, count).sort((a,b)=>a-b);
        }
        const getTopNumbers = getTopNumbersFallback;
        document.getElementById('generateDanTuoBtn').onclick = () => {
            const danCount = parseInt(document.getElementById('danCountSelect').value);
            const tuoCount = parseInt(document.getElementById('tuoCountSelect').value);
            const danNumbers = getTopNumbers(rawData, danCount);
            const tuoNumbers = getTopNumbers(rawData, tuoCount, danNumbers);
            const needFromTuo = 6 - danCount;
            const comboCount = combination(tuoCount, needFromTuo);
            const totalAmount = comboCount * currentPrice;
            const result = savePrediction('dantuo', { danCount, tuoCount, price: currentPrice }, { dan: danNumbers, tuo: tuoNumbers });
            let alertHtml = '';
            if (!result.isNew) {
                alertHtml = `<div class="code-box" style="background:#fef3c7; border-color:#f97316;"><div>⚠️ 本期已推薦 祝你好運</div><div>📌 核對碼：${result.code}</div></div>`;
            }
            let danHtml = `<div class="combo-info" style="background:#fef9c3;"><strong>🎯 膽 </strong><br>${danNumbers.map(n => `<span class="number-badge" style="background:#f97316;">${n}</span>`).join('')}</div><div class="combo-info"><strong>📌 配腳 </strong><br>${tuoNumbers.map(n => `<span class="number-badge">${n}</span>`).join('')}</div><div class="combo-info">C(${tuoCount},${needFromTuo}) = ${comboCount.toLocaleString()} 注<br><strong>總金額：$${totalAmount.toLocaleString()}</strong></div>`;
            if (result.isNew) danHtml += `<div class="code-box"><div>📌 您的核對碼</div><div class="code">${result.code}</div><div style="font-size:0.8rem;">💡 開獎後到「核對中獎」輸入此碼</div></div>`;
            else danHtml += alertHtml;
            document.getElementById('danTuoResultPanel').innerHTML = danHtml;
            document.getElementById('danTuoResultPanel').classList.remove('hidden');
        };
        updateTuo();
    }

    // ========== 核對中獎模式 (保留原有邏輯，略) ==========
    async function renderCheck() {
        // 為節省篇幅，此處可保留你原本的 renderCheck 內容，或者暫時簡單顯示提示。
        // 此處略，可後續補充。
        document.getElementById('mainApp').innerHTML = `<div class="card">核對中獎模式待完善</div>`;
    }

    // ========== 切換模式 ==========
    function switchMode(mode) {
        currentMode = mode;
        const modes = ['single', 'replica', 'danTuo', 'check'];
        document.querySelectorAll('.mode-tab').forEach((tab, idx) => tab.classList.toggle('active', modes[idx] === mode));
        if (mode === 'single') renderSingle();
        else if (mode === 'replica') renderReplica();
        else if (mode === 'danTuo') renderDanTuo();
        else renderCheck();
    }

    // ========== 初始化 ==========
    async function init() {
        document.getElementById('mainApp').innerHTML = `<div class="card loading">📡 正在載入最新開獎數據...</div>`;
        const records = await loadCsvData();
        if (!records || records.length === 0) {
            document.getElementById('mainApp').innerHTML = `<div class="card error-box">❌ 讀取失敗，請確認 Google Sheets 已設為「知道連結的人可檢視」</div>`;
            return;
        }
        rawData = records;
        console.log("數據載入成功，共", rawData.length, "期");
        document.getElementById('singleModeTab').onclick = () => switchMode('single');
        document.getElementById('replicaModeTab').onclick = () => switchMode('replica');
        document.getElementById('danTuoModeTab').onclick = () => switchMode('danTuo');
        document.getElementById('checkModeTab').onclick = () => switchMode('check');
        loadCheckRecords();
        renderSingle();
    }
    init();
</script>
