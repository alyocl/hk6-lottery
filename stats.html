<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>推薦統計 | 六合彩 AI 分析系統</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans TC', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.4);
        }
        .card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #0f172a;
            margin-top: 0;
        }
        h2 {
            color: #f97316;
            font-size: 1.3rem;
            margin-top: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th, td {
            text-align: left;
            padding: 8px 6px;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background-color: #f1f5f9;
            font-weight: 600;
        }
        .stat-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: #f8fafc;
            border-radius: 1rem;
            padding: 1rem;
            flex: 1;
            min-width: 150px;
            text-align: center;
            border-left: 4px solid #f97316;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #f97316;
        }
        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: #f97316;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .footer {
            text-align: center;
            margin-top: 2rem;
            color: #94a3b8;
            font-size: 0.75rem;
        }
        .export-btn {
            background-color: #f97316;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 500;
            margin-bottom: 1rem;
            float: right;
        }
        .export-btn:hover {
            background-color: #ea580c;
        }
        @media (max-width: 768px) {
            th, td {
                font-size: 0.7rem;
                padding: 4px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📊 全域推薦統計</h1>
        <p>此頁面統計所有透過表單收集的推薦記錄（唯讀）。</p>
        <a href="/" class="back-link">← 返回首頁</a>
        <button id="exportStatsBtn" class="export-btn">📎 匯出 CSV</button>
    </div>

    <div id="statsContent">
        <div class="card">正在載入統計資料...</div>
    </div>
    <div class="footer">
        🔞 博彩要有節制 | 未滿十八歲人士不得投注 | 切勿沉迷賭博
    </div>
</div>

<script>
    // ========== 設定區 ==========
     const API_KEY = 'AIzaSyCmpR7qGwgfE3y7XIS-O1_cny_iBsDa7No';
    const SPREADSHEET_ID = '1ddt9iUMO4FYqJI5_mnoSU5LmgcFW8XKeI043UPY-iKk';   // ✅ 已更新
    const RANGE = 'Form Responses 1!A:F';   // 请根据您的工作表名称调整
    // ===========================

    async function loadAllRecommendations() {
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${RANGE}?key=${API_KEY}`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (!data.values || data.values.length < 2) return [];
            const headers = data.values[0];
            const colCode = headers.indexOf('Check Code');
            const colMode = headers.indexOf('Mode');
            const colParams = headers.indexOf('Params');
            const colRec = headers.indexOf('Recommendations');
            const colIssue = headers.indexOf('Issue Key');
            const colTimestamp = 0; // 第一列是時間戳
            const records = [];
            for (let i = 1; i < data.values.length; i++) {
                const row = data.values[i];
                records.push({
                    timestamp: row[colTimestamp],
                    code: row[colCode],
                    mode: row[colMode],
                    params: row[colParams] ? JSON.parse(row[colParams]) : {},
                    recommendations: row[colRec] ? JSON.parse(row[colRec]) : [],
                    issueKey: row[colIssue]
                });
            }
            return records;
        } catch (err) {
            console.error('讀取失敗:', err);
            return [];
        }
    }

    function exportToCSV(records) {
        if (!records.length) return;
        const headers = ['時間戳', '核對碼', '玩法', '參數', '推薦號碼', '期號'];
        const rows = records.map(r => [
            r.timestamp,
            r.code,
            r.mode,
            JSON.stringify(r.params),
            JSON.stringify(r.recommendations),
            r.issueKey
        ]);
        const csvContent = [headers, ...rows].map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
        const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute('download', 'lottery_recommendations.csv');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    async function renderStats() {
        document.getElementById('statsContent').innerHTML = '<div class="card">📡 載入中...</div>';
        const records = await loadAllRecommendations();
        if (records.length === 0) {
            document.getElementById('statsContent').innerHTML = '<div class="card">📭 暫無推薦記錄。</div>';
            return;
        }

        // 統計摘要
        const total = records.length;
        const modeCount = { single:0, replica:0, dantuo:0 };
        records.forEach(r => { modeCount[r.mode] = (modeCount[r.mode] || 0) + 1; });

        let statsHtml = `
            <div class="stat-grid">
                <div class="stat-card"><div class="stat-number">${total}</div><div>總推薦數</div></div>
                <div class="stat-card"><div class="stat-number">${modeCount.single || 0}</div><div>單式</div></div>
                <div class="stat-card"><div class="stat-number">${modeCount.replica || 0}</div><div>複式</div></div>
                <div class="stat-card"><div class="stat-number">${modeCount.dantuo || 0}</div><div>膽拖</div></div>
            </div>
            <div class="card">
                <h2>📋 詳細記錄</h2>
                <div style="overflow-x:auto;">
                    <table id="detailTable">
                        <thead><tr><th>時間</th><th>核對碼</th><th>玩法</th><th>參數</th><th>推薦號碼</th><th>期號</th></tr></thead>
                        <tbody>
        `;
        records.slice().reverse().forEach(r => {
            const recStr = JSON.stringify(r.recommendations);
            statsHtml += `<tr>
                <td>${new Date(r.timestamp).toLocaleString()}</td>
                <td>${r.code}</td>
                <td>${r.mode}</td>
                <td>${JSON.stringify(r.params)}</td>
                <td title="${recStr}">${recStr.substring(0, 50)}${recStr.length>50 ? '…' : ''}</td>
                <td>${r.issueKey}</td>
            </tr>`;
        });
        statsHtml += `</tbody></table></div></div>`;
        document.getElementById('statsContent').innerHTML = statsHtml;
        document.getElementById('exportStatsBtn').onclick = () => exportToCSV(records);
    }

    renderStats();
</script>
</body>
</html>
